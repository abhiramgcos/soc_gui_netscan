services:
  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: soc_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soc_network}
      POSTGRES_USER: ${POSTGRES_USER:-soc_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soc_admin} -d ${POSTGRES_DB:-soc_network}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - soc_net

  # ──────────────────────────────────────────────
  # FastAPI Backend
  # ──────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soc_api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-soc_admin}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-soc_network}"
      DATABASE_URL_SYNC: "postgresql://${POSTGRES_USER:-soc_admin}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-soc_network}"
      REDIS_URL: "redis://redis:6379/0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      WORKERS: ${API_WORKERS:-2}
      # Firmware analysis
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:4b}
      EMBA_PATH: ${EMBA_PATH:-/opt/emba/emba}
      EMBA_HOME: /opt/emba
      EMBA_TIMEOUT: ${EMBA_TIMEOUT:-1800}
      EMBA_GPT_LEVEL: ${EMBA_GPT_LEVEL:-1}
      EMBA_PROFILE: ${EMBA_PROFILE:-default-scan.emba}
      EMBA_FAST_MODE: ${EMBA_FAST_MODE:-0}
      EMBA_MODULES: ${EMBA_MODULES:-p05,s10,s20,s40}
      TRIAGE_MAX_FINDINGS: ${TRIAGE_MAX_FINDINGS:-120}
      SCAN_INTERFACE: ${SCAN_INTERFACE:-eth0}
      EMBA_CONTAINER_NAME: ${EMBA_CONTAINER_NAME:-soc_emba}
    ports:
      - "${API_PORT:-8001}:8001"
    volumes:
      - ./backend:/app
      - ./db/devices:/app/db_devices
      - scan_results:/app/scan_results
      - firmware_data:/app/firmware
      - emba_logs:/app/emba_logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      emba:
        condition: service_started
    # Required for nmap SYN scans, ARP lookups, and RustScan
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      - soc_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────
  # Background Scan Worker
  # ──────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soc_worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker.main"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-soc_admin}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-soc_network}"
      DATABASE_URL_SYNC: "postgresql://${POSTGRES_USER:-soc_admin}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-soc_network}"
      REDIS_URL: "redis://redis:6379/0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      # Firmware analysis
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:4b}
      EMBA_PATH: ${EMBA_PATH:-/opt/emba/emba}
      EMBA_HOME: /opt/emba
      EMBA_TIMEOUT: ${EMBA_TIMEOUT:-1800}
      EMBA_GPT_LEVEL: ${EMBA_GPT_LEVEL:-1}
      EMBA_PROFILE: ${EMBA_PROFILE:-default-scan.emba}
      EMBA_FAST_MODE: ${EMBA_FAST_MODE:-0}
      EMBA_MODULES: ${EMBA_MODULES:-p05,s10,s20,s40}
      TRIAGE_MAX_FINDINGS: ${TRIAGE_MAX_FINDINGS:-120}
      SCAN_INTERFACE: ${SCAN_INTERFACE:-eth0}
      EMBA_CONTAINER_NAME: ${EMBA_CONTAINER_NAME:-soc_emba}
    volumes:
      - ./backend:/app
      - ./db/devices:/app/db_devices
      - scan_results:/app/scan_results
      - firmware_data:/app/firmware
      - emba_logs:/app/emba_logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      emba:
        condition: service_started
    # Required for nmap SYN scans, ARP lookups, and RustScan
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      - soc_net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('redis', 6379), 2).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────
  # Redis (job queue & pub/sub)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: soc_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - soc_net

  # ──────────────────────────────────────────────
  # Ollama (local LLM for AI firmware triage)
  # ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: soc_ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU acceleration (NVIDIA)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s
    networks:
      - soc_net

  # ──────────────────────────────────────────────
  # EMBA Runtime Container
  # ──────────────────────────────────────────────
  emba:
    image: embeddedanalyzer/emba:latest
    container_name: soc_emba
    restart: unless-stopped
    init: true
    entrypoint: ["/bin/bash", "-lc"]
    command: ["tail -f /dev/null"]
    environment:
      USER: root
      SUDO_USER: root
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_MODULE
      - NET_ADMIN
    volumes:
      - ${EMBA_HOST_PATH:-/var/home/abhiramgcos/emba}:/emba
      - firmware_data:/app/firmware
      - emba_logs:/app/emba_logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /lib/modules:/lib/modules:ro
    networks:
      - soc_net

  # ──────────────────────────────────────────────
  # React Frontend (Vite dev / nginx prod)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soc_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - soc_net
    healthcheck:
      test: ["CMD", "pidof", "nginx"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
  scan_results:
    driver: local
  firmware_data:
    driver: local
  emba_logs:
    driver: local
  ollama_data:
    driver: local

networks:
  soc_net:
    driver: bridge
